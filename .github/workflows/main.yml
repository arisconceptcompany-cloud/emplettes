name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '/package-lock.json'

      - name: Install dependencies
        working-directory: /
        run: npm ci

      - name: Build project
        working-directory: /
        run: npm run build

      - name: Verify build
        run: |
          if [ ! -d "/dist" ]; then
            echo "dist folder missing"
            exit 1
          fi
          if [ ! -f "/dist/index.html" ]; then
            echo "index.html missing"
            exit 1
          fi
          echo "Build OK"
          # Correction : on pointe vers frontend/dist
          du -sh /dist

      - name: Deploy via FTP
        uses: sebastianpopp/ftp-action@releases/v2
        with:
          host: ${{ secrets.SERVERS }}
          user: ${{ secrets.NAMES }}
          password: ${{ secrets.PASSS }}
          protocol: ftp
          port: 21
          # Correction cruciale : le dossier à envoyer est dans frontend/
          localDir: /dist
          remoteDir: /
          dangerous-clean-slate: true