name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # ✅ Pas de cache-dependency-path si package-lock.json est à la racine du repo

      - name: Install dependencies
        run: npm ci
        # ✅ Pas de working-directory, GitHub Actions est déjà dans la racine du repo

      - name: Build project
        run: npm run build

      - name: Verify build
        run: |
          echo "Contenu de la racine :"
          ls -la
          # Adapte "dist" ou "out" selon ton framework
          if [ ! -d "dist" ] && [ ! -d "out" ]; then
            echo "❌ Aucun dossier de build trouvé (ni dist ni out)"
            exit 1
          fi
          BUILD_DIR=$([ -d "out" ] && echo "out" || echo "dist")
          echo "✅ Build trouvé dans : $BUILD_DIR"
          du -sh $BUILD_DIR

      - name: Deploy via FTP
        uses: sebastianpopp/ftp-action@releases/v2
        with:
          host: ${{ secrets.SERVERS }}
          user: ${{ secrets.NAMES }}
          password: ${{ secrets.PASSS }}
          protocol: ftp
          port: 21
          localDir: ./out/   # ✅ Mets "out" pour Next.js, "dist" pour Vite/CRA
          remoteDir: /
          dangerous-clean-slate: true